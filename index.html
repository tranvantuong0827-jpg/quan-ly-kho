<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cá Cảnh Kim Phát</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; }
        .hidden { display: none; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-3">

<div id="login-box" class="max-w-md mx-auto mt-10 bg-white p-8 rounded-[2.5rem] card-shadow border border-white">
    <h2 class="text-2xl font-black text-center text-blue-900 mb-6 uppercase italic">CÁ CẢNH KIM PHÁT</h2>
    <div class="space-y-4">
        <input id="u" type="text" placeholder="Tên đăng nhập" class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
        <input id="p" type="password" placeholder="Mật khẩu" class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
        <button onclick="login()" id="btn-login" class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-lg">Đăng Nhập</button>
    </div>
</div>

<div id="main-app" class="hidden max-w-md mx-auto space-y-4 pb-20">
    <div class="flex justify-between items-center px-2">
        <div>
            <h1 class="font-black text-blue-900 italic text-xl">KIM PHÁT POS</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase">Nhân sự: <span id="u-name" class="text-blue-600"></span></p>
        </div>
        <button onclick="location.reload()" class="bg-red-50 text-red-500 p-2 rounded-xl text-xs font-bold uppercase">Thoát</button>
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div class="bg-blue-700 p-4 rounded-3xl text-white shadow-md">
            <p class="text-[10px] font-bold uppercase opacity-70">Doanh thu ngày</p>
            <p id="stat-day" class="text-lg font-black italic">0đ</p>
        </div>
        <div class="bg-emerald-700 p-4 rounded-3xl text-white shadow-md">
            <p class="text-[10px] font-bold uppercase opacity-70">Doanh thu tháng</p>
            <p id="stat-month" class="text-lg font-black italic">0đ</p>
        </div>
    </div>

    <div class="bg-white p-5 rounded-[2rem] shadow-lg space-y-3 border border-white">
        <div class="flex gap-2">
            <button onclick="setTab('Bán hàng')" id="t-ban" class="flex-1 py-2 rounded-xl font-black text-xs uppercase bg-blue-700 text-white shadow-md">🛍️ Bán Ra</button>
            <button onclick="setTab('Nhập hàng')" id="t-nhap" class="flex-1 py-2 rounded-xl font-black text-xs uppercase bg-slate-100 text-slate-500">📦 Nhập Kho</button>
        </div>

        <div id="ncc-box" class="hidden animate__animated animate__fadeIn">
            <input id="common-ncc" type="text" placeholder="Nhập tên Nhà Cung Cấp cho đơn này..." class="w-full bg-yellow-50 p-4 rounded-2xl outline-none border-2 border-yellow-200 font-bold text-sm">
        </div>

        <div id="items-container" class="space-y-3"></div>

        <button onclick="addItem()" class="w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold text-xs">+ THÊM MÓN</button>

        <div class="pt-2 border-t border-slate-50">
            <select id="p-method" class="w-full bg-slate-50 p-3 rounded-xl outline-none font-bold text-slate-600 text-sm mb-3">
                <option value="Tiền mặt">💵 Tiền mặt</option>
                <option value="Chuyển khoản">🏦 Chuyển khoản</option>
            </select>
            <div class="flex justify-between items-center mb-4 px-1">
                <span class="font-bold text-slate-500 text-sm uppercase">Tổng cộng:</span>
                <span id="total-bill" class="text-2xl font-black text-red-600 italic">0đ</span>
            </div>
            <button onclick="submitOrder()" id="btn-save" class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-lg">Lưu Giao Dịch</button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-[2rem] shadow-lg border border-white">
        <h3 class="font-black text-slate-800 uppercase italic mb-3">Kiểm Kho Fast</h3>
        <input type="text" onkeyup="filterStock(this.value)" placeholder="🔍 Tìm tên sản phẩm..." class="w-full bg-slate-100 p-4 rounded-2xl outline-none border-0 mb-4 text-sm font-medium">
        <div id="stock-list" class="space-y-3 max-h-80 overflow-y-auto pr-2">Đang tải dữ liệu...</div>
    </div>
</div>

<datalist id="p-datalist"></datalist>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAYuVL1rzjrnRD0mNgqZ5Gpy0Tt3Zj-qCxS1j76tlZMTseMNT_vpi0ic_e6p33cKxDgg/exec";
    let currentUser = "", currentTab = "Bán hàng", productList = [], historyData = [];

    function fM(n) { return Number(n || 0).toLocaleString('vi-VN') + "đ"; }

    async function login() {
        const u = document.getElementById('u').value.trim(), p = document.getElementById('p').value.trim();
        if(!u || !p) return;
        document.getElementById('btn-login').innerText = "Đang xác thực...";
        try {
            const res = await fetch(`${SCRIPT_URL}?action=login&u=${u}&p=${p}`).then(r => r.json());
            if(res.status === 'success') {
                currentUser = u;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('u-name').innerText = u;
                refreshData();
            } else { alert("Sai tài khoản!"); document.getElementById('btn-login').innerText = "Đăng Nhập"; }
        } catch(e) { alert("Lỗi mạng!"); }
    }

    async function refreshData() {
        productList = await fetch(`${SCRIPT_URL}?action=getProducts`).then(r => r.json());
        historyData = await fetch(`${SCRIPT_URL}?action=getHistory`).then(r => r.json());
        
        document.getElementById('p-datalist').innerHTML = productList.map(p => `<option value="${p.ten}">`).join('');
        renderStock();
        updateStats();
        if(document.getElementById('items-container').children.length === 0) addItem();
    }

    function renderStock(filter = "") {
        const list = document.getElementById('stock-list');
        list.innerHTML = productList
            .filter(p => p.ten.toLowerCase().includes(filter.toLowerCase()))
            .map(p => `
                <div class="flex justify-between items-center py-2 border-b border-slate-50">
                    <div>
                        <p class="text-[14px] font-black text-blue-900 leading-tight uppercase">${p.id || '---'}</p>
                        <p class="text-[10px] font-bold text-slate-500 uppercase">${p.ten}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-lg ${p.ton_kho <= 5 ? 'text-red-600 animate-pulse' : 'text-emerald-600'}">${p.ton_kho}</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase">Còn lại</p>
                    </div>
                </div>
            `).join('');
    }

    function addItem() {
        const id = Date.now();
        const row = `
            <div id="row-${id}" class="bg-slate-50 p-4 rounded-2xl relative border border-slate-100">
                <button onclick="this.parentElement.remove();calcTotal()" class="absolute -top-2 -right-2 bg-white text-red-500 w-6 h-6 rounded-full shadow-md font-bold text-xs flex items-center justify-center border border-red-100">✕</button>
                <input list="p-datalist" onchange="fillPrice(${id}, this.value)" class="w-full bg-transparent border-b border-slate-200 mb-3 py-1 font-bold outline-none uppercase text-sm" placeholder="Tên món...">
                <div class="grid grid-cols-2 gap-4">
                    <div><small class="text-[8px] font-bold text-slate-400 uppercase">Số lượng</small><input type="number" onchange="calcTotal()" class="q w-full bg-transparent font-black text-lg outline-none" value="1"></div>
                    <div><small class="text-[8px] font-bold text-slate-400 uppercase">Đơn giá</small><input type="number" onchange="calcTotal()" class="p w-full bg-transparent font-black text-lg text-blue-700 outline-none" value="0"></div>
                </div>
                <div id="stock-hint-${id}" class="text-[9px] font-bold text-slate-400 mt-1 italic">Kho: --</div>
            </div>`;
        document.getElementById('items-container').insertAdjacentHTML('beforeend', row);
    }

    function fillPrice(id, name) {
        const p = productList.find(x => x.ten.toLowerCase() === name.toLowerCase());
        if(p) {
            const row = document.getElementById(`row-${id}`);
            row.querySelector('.p').value = (currentTab === "Bán hàng") ? (p.gia_ban || 0) : (p.gia_nhap || 0);
            document.getElementById(`stock-hint-${id}`).innerText = "Kho: " + p.ton_kho;
            document.getElementById(`stock-hint-${id}`).setAttribute('data-max', p.ton_kho);
        }
        calcTotal();
    }

    function setTab(t) {
        currentTab = t;
        document.getElementById('t-ban').className = t === 'Bán hàng' ? 'flex-1 py-2 rounded-xl font-black text-xs uppercase bg-blue-700 text-white shadow-md' : 'flex-1 py-2 rounded-xl font-black text-xs uppercase bg-slate-100 text-slate-500';
        document.getElementById('t-nhap').className = t === 'Nhập hàng' ? 'flex-1 py-2 rounded-xl font-black text-xs uppercase bg-blue-700 text-white shadow-md' : 'flex-1 py-2 rounded-xl font-black text-xs uppercase bg-slate-100 text-slate-500';
        document.getElementById('ncc-box').classList.toggle('hidden', t === 'Bán hàng');
        calcTotal();
    }

    function calcTotal() {
        let total = 0;
        document.querySelectorAll('#items-container > div').forEach(row => {
            const q = Number(row.querySelector('.q').value), p = Number(row.querySelector('.p').value);
            total += q * p;
        });
        document.getElementById('total-bill').innerText = fM(total);
    }

    async function submitOrder() {
        const items = [];
        let stockError = "";
        
        document.querySelectorAll('#items-container > div').forEach(row => {
            const ten = row.querySelector('input').value, sl = Number(row.querySelector('.q').value), gia = Number(row.querySelector('.p').value);
            const maxStock = Number(row.querySelector('[data-max]')?.getAttribute('data-max') || 999999);
            
            if(ten && sl > 0) {
                // KIỂM TRA TỒN KHO TRƯỚC KHI GỬI
                if(currentTab === "Bán hàng" && sl > maxStock) {
                    stockError = `Sản phẩm "${ten}" chỉ còn ${maxStock}. Bạn không thể bán ${sl}!`;
                }
                items.push({ten, sl, gia});
            }
        });

        if(stockError) return Swal.fire('Lỗi tồn kho', stockError, 'error');
        if(items.length === 0) return;
        
        const btn = document.getElementById('btn-save');
        btn.disabled = true; btn.innerText = "Đang xử lý...";

        const payload = {
            action: "saveOrder",
            type: currentTab,
            user: currentUser,
            method: document.getElementById('p-method').value,
            commonNCC: document.getElementById('common-ncc').value.trim() || "Kim Phát",
            items: items
        };

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r => r.text());
            if(res.includes("ERR_STOCK")) {
                Swal.fire('Lỗi', 'Sản phẩm ' + res.split(":")[1] + ' đã hết hàng trong lúc bạn thao tác!', 'error');
            } else {
                Swal.fire({ title: 'Thành công!', icon: 'success', timer: 1000, showConfirmButton: false });
                document.getElementById('items-container').innerHTML = "";
                document.getElementById('common-ncc').value = "";
                refreshData();
            }
        } catch(e) { alert("Lỗi lưu đơn!"); }
        finally { btn.disabled = false; btn.innerText = "Lưu Giao Dịch"; }
    }

    function updateStats() {
        const now = new Date(), todayStr = now.toLocaleDateString('vi-VN');
        let d = 0, m = 0;
        historyData.forEach(x => {
            const date = new Date(x["thời gian"] || x.thoigian);
            if(x.loi === "Bán hàng") {
                if(date.toLocaleDateString('vi-VN') === todayStr) d += Number(x.thanhtien);
                if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) m += Number(x.thanhtien);
            }
        });
        document.getElementById('stat-day').innerText = fM(d);
        document.getElementById('stat-month').innerText = fM(m);
    }

    function filterStock(val) { renderStock(val); }
</script>
</body>
</html>
